# 学术论文检索配置 — 改这里然后跑 `python search.py`
#
# 字段说明:
#   keywords     : 关键词列表(每行一个,引号包裹保险)
#   field        : 检索字段 — TITLE | ABS | KEY | TITLE-ABS-KEY | ALL
#   year_start   : 起始年份(含)
#   year_end     : 结束年份(含)
#   doc_type     : 文献类型 — ar(Article) | re(Review) | cp(会议) | all
#   max_results  : 最多返回篇数(1-200)
#   combine      : 关键词之间的连接 — AND(都包含) | OR(任一)

keywords:
  - "transit-oriented development"

field: TITLE-ABS-KEY
year_start: 2022
year_end: 2026
doc_type: ar
max_results: 20
combine: AND
